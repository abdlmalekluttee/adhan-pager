services:
  adhan-pager:
    build: .
    image: adhan-pager:latest
    container_name: adhan-pager
    restart: unless-stopped

    # Host networking is strongly recommended for SIP: it lets the UA register
    # and pass RTP audio without Docker NAT mangling SIP/SDP. The web UI is then
    # reachable on http://<host-ip>:8080 (set web.port in config to change it).
    network_mode: host

    environment:
      - TZ=UTC                       # container OS timezone
      - CONFIG_PATH=/config/config.yaml
      - AUDIO_DIR=/audio

    volumes:
      - ./config:/config             # persisted settings (config.yaml)
      - ./audio:/audio               # uploaded Adhan recordings

    # Optional: allow the container to step the system clock from NTP.
    # Only needed if you enable "Set system clock" in the Time tab.
    # cap_add:
    #   - SYS_TIME

# ---------------------------------------------------------------------------
# If you cannot use host networking (e.g. Docker Desktop on macOS/Windows),
# replace the service block's `network_mode: host` with explicit port mappings.
# SIP and RTP behind NAT may need your PBX configured for it:
#
#   ports:
#     - "8080:8080"          # web UI
#     - "5060:5060/udp"      # SIP signalling
#     - "5060:5060/tcp"
#     - "16000-16100:16000-16100/udp"   # RTP media range
# ---------------------------------------------------------------------------
